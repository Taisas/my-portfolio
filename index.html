<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="portfolio-wrap">
    <div class="portfolio-header">
      <h1>Taisas Portfolio</h1>
      <p>HTML / CSS / JavaScript / Web Design</p>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="プロジェクト詳細">
    <div class="modal" id="modal">
      <button class="close-btn" id="closeBtn" aria-label="閉じる">
        <i class="ti ti-x" aria-hidden="true"></i>
      </button>
      <div class="modal-hero" id="mHero"></div>
      <div class="modal-body">
        <h2 class="modal-title" id="mTitle"></h2>
        <div class="modal-meta" id="mMeta"></div>
        <p class="modal-desc" id="mDesc"></p>
        <div class="modal-features">
          <div class="modal-features-title">FEATURES</div>
          <div class="feature-list" id="mFeatures"></div>
        </div>
        <a class="modal-link" href="#" id="mLink" target="_blank" rel="noopener">
          <i class="ti ti-external-link" aria-hidden="true"></i> サイトを見る
        </a>
      </div>
    </div>
  </div>

  <div class="video-overlay" id="videoOverlay" role="dialog" aria-modal="true" aria-label="動画プレビュー">
    <div class="video-container">
      <button class="close-btn video-close-btn" id="videoCloseBtn" aria-label="閉じる">
        <i class="ti ti-x" aria-hidden="true"></i>
      </button>
      <video id="videoPlayer" controls playsinline></video>
    </div>
  </div>

  <div class="auth-screen" id="authScreen">
    <div class="auth-card">
      <p class="auth-label">PORTFOLIO</p>
      <h1 class="auth-title">Private Access</h1>
      <p class="auth-sub">パスワードを入力してください</p>
      <form class="auth-form" id="authForm" novalidate>
        <input
          class="auth-input"
          id="authInput"
          type="password"
          placeholder="Password"
          autocomplete="current-password"
          aria-label="パスワード"
        >
        <p class="auth-error" id="authError" aria-live="polite"></p>
        <button class="auth-btn" type="submit">Enter</button>
      </form>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
